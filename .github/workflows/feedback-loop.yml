name: AI Agent Feedback Loop

on:
  schedule:
    # Chạy tự động vào 00:00 UTC (khoảng 7:00 sáng giờ VN) thứ Hai hàng tuần
    - cron: '0 0 * * 1'
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công trên GitHub UI

jobs:
  review-and-learn:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho GitHub Actions có thể commit và push code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử file

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0' 

      - name: Install dependencies
        run: npm ci

      - name: Build MCP Servers
        run: npm run build

      - name: Run Opencode CLI for Feedback Loop
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DNSE_API_KEY: ${{ secrets.DNSE_API_KEY }}
        run: |
          npm install -g opencode-ai
          
          # Tạo cấu hình MCP cho GitHub Actions để Opencode biết các MCP servers
          cat <<EOF > mcp.json
          {
            "mcpServers": {
              "fireant-mcp": {
                "type": "local",
                "command": ["node", "mcp-server/build/index.js"]
              },
              "dnse-mcp": {
                "type": "local",
                "command": ["node", "mcp-server-dnse/build/index.js"]
              },
              "buffett-mcp": {
                "type": "local",
                "command": ["node", "mcp-server-buffett/build/index.js"]
              },
              "munger-mcp": {
                "type": "local",
                "command": ["node", "mcp-server-munger/build/index.js"]
              },
              "industry-mcp": {
                "type": "local",
                "command": ["node", "mcp-server-industry/build/index.js"]
              }
            }
          }
          EOF
          
          # Chạy trực tiếp Opencode CLI với file prompt template và chỉ định mcp.json
          opencode run "hãy thực hiện task này @[agent/templates/feedback-loop.md]" -c mcp.json

      - name: Commit and push Lessons Learned
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Thêm các file thay đổi (chủ yếu là lessons_learned.md hoặc các file update)
          git add knowledge/
          
          # Commit nếu có thay đổi, bỏ qua nếu không
          git commit -m "🤖 AI Tự học: Cập nhật bài học (Feedback Loop) từ diễn biến thị trường" || echo "Không có cập nhật bài học mới"
          
          git push
