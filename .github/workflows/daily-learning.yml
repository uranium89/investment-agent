name: AI Daily Industry Learning

on:
  schedule:
    # Chạy tự động vào 00:00 UTC (khoảng 7:00 sáng giờ VN) mỗi ngày
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép chạy thủ công trên GitHub UI

jobs:
  daily-learning:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho GitHub Actions có thể commit và push code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử file

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0' 

      - name: Install dependencies
        run: npm ci

      - name: Build MCP Servers
        run: npm run build

      - name: Run Opencode CLI for Daily Learning
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DNSE_API_KEY: ${{ secrets.DNSE_API_KEY }}
        run: |
          npm install -g opencode-ai
          
          # Chạy trực tiếp Opencode CLI với file prompt template và chỉ định mcp.json
          opencode run "hãy thực hiện task này @[agent/templates/daily-industry-learning.md]" -c mcp.json

      - name: Commit and push Knowledge Base updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Thêm các file thay đổi trong thư mục knowledge/industries
          git add knowledge/industries/
          
          # Commit nếu có thay đổi, bỏ qua nếu không
          git commit -m "🤖 AI Tự học: Cập nhật kiến thức ngành hàng ngày" || echo "Không có cập nhật kiến thức mới hôm nay"
          
          git push
